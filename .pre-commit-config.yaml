# .pre-commit-config.yaml
# Automated code quality gates for Simplex-DG Solver
# Ensures all commits meet docstring, type-hint, and mathematical rigor standards.

repos:
  # Code formatting: Black (line length 100, Python 3.9+)
  - repo: https://github.com/psf/black
    rev: 23.1.0
    hooks:
      - id: black
        language_version: python3.9
        args: ["--line-length=100"]
        stages: [commit]

  # Import sorting: isort (black-compatible)
  - repo: https://github.com/PyCQA/isort
    rev: 5.12.0
    hooks:
      - id: isort
        args: ["--profile=black", "--line-length=100"]
        stages: [commit]

  # Type checking: mypy (gradual typing for scientific code)
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.0.0
    hooks:
      - id: mypy
        args: [--ignore-missing-imports, --no-error-summary, --implicit-optional]
        additional_dependencies: ['types-setuptools']
        stages: [commit]
        exclude: tests/

  # Linting: flake8 (style and error checking)
  - repo: https://github.com/PyCQA/flake8
    rev: 6.0.0
    hooks:
      - id: flake8
        args: [--max-line-length=100, --extend-ignore=E203,W503,E501]
        exclude: tests/
        stages: [commit]

  # YAML validation
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.4.0
    hooks:
      - id: check-yaml
      - id: check-toml
      - id: check-json
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-merge-conflict
      - id: debug-statements
      stages: [commit]

  # Docstring validation (numpy convention)
  - repo: https://github.com/PyCQA/pydocstyle
    rev: 6.3.0
    hooks:
      - id: pydocstyle
        args: ["--convention=numpy"]
        exclude: "^tests/"
        stages: [commit]

  # Markdown linting (documentation quality)
  - repo: https://github.com/executablebooks/mdformat
    rev: 0.7.16
    hooks:
      - id: mdformat
        additional_dependencies: ['mdformat-gfm']
        args: ['--wrap', '100']
        exclude: ".github/copilot-instructions.md"
        stages: [commit]

default_language_version:
  python: python3.9

# Run all checks before commit
fail_fast: false
verbose: true
